<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Frag Vault</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: #0a0a0a; color: #e0e0e0; }
        header { background: linear-gradient(135deg, #1a1a1a, #0f0f0f); padding: 1.6rem 1rem; text-align: center; }
        .controls { padding: 15px; background: #111; }
        .control-row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 10px; }
        button { padding: 8px 12px; font-size: 13px; border-radius: 20px; }
        .refresh-btn { background: #d97706; color: white; }
        .startover-btn { background: #d97706; color: white; }
        .export-btn { background: #15803d; color: white; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 8px; border-bottom: 1px solid #333; text-align: left; }
    </style>
</head>
<body>
    <header>
        <h1>The Frag Vault</h1>
        <div id="total-display">Total Selected: $0</div>
    </header>
    
    <div class="controls">
        <div class="control-row">
            <button onclick="refreshData()" class="refresh-btn" id="refreshBtn">🔄 Refresh</button>
            <button onclick="startOver()" class="startover-btn">Start Over</button>
            <button onclick="showSelectionModal()" class="export-btn">Total</button>
        </div>
        <div class="control-row">
            <input type="text" id="search" placeholder="Search..." style="width:100%;padding:10px;" onkeyup="filterTable()">
        </div>
    </div>

    <div style="padding:0 10px;">
        <table id="sales-table">
            <thead>
                <tr>
                    <th>House</th>
                    <th>Name</th>
                    <th>5ml</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
        let sales = [];

        async function fetchJSON() {
            try {
                const res = await fetch('data/sales.json?t=' + Date.now());
                return await res.json();
            } catch (e) {
                console.error(e);
                return [];
            }
        }

        async function refreshData() {
            const btn = document.getElementById('refreshBtn');
            btn.textContent = 'Loading...';
            sales = await fetchJSON();
            renderTable();
            btn.textContent = '🔄 Refresh';
        }

        function renderTable() {
            const tbody = document.querySelector('#sales-table tbody');
            tbody.innerHTML = '';
            sales.forEach(item => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${item.House || ''}</td>
                    <td>${item.Name || ''}</td>
                    <td>${item['5ml'] || ''}</td>
                    <td>${item.Status || ''}</td>
                `;
                tbody.appendChild(row);
            });
        }

        function filterTable() {
            const term = document.getElementById('search').value.toLowerCase();
            const filtered = sales.filter(item => 
                (item.House || '').toLowerCase().includes(term) || (item.Name || '').toLowerCase().includes(term)
            );
            const tbody = document.querySelector('#sales-table tbody');
            tbody.innerHTML = '';
            filtered.forEach(item => {
                const row = document.createElement('tr');
                row.innerHTML = `<td>\( {item.House}</td><td> \){item.Name}</td><td>\( {item['5ml']}</td><td> \){item.Status}</td>`;
                tbody.appendChild(row);
            });
        }

        function startOver() {
            document.getElementById('search').value = '';
            renderTable();
        }

        function showSelectionModal() {
            alert('Total: $0');
        }

        window.onload = async () => {
            sales = await fetchJSON();
            renderTable();
        };
    </script>
</body>
</html>
