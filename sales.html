<!DOCTYPE html>
<!-- SALES PAGE - FAST JSON VERSION -->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Frag Vault</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        /* Keep all your existing styles here - copy from your original */
        /* ... (paste your full <style> block) ... */
        
        .refresh-btn, .startover-btn, .export-btn { 
            padding: 9px 14px; 
            font-size: 13px; 
            min-width: 85px;
        }
    </style>
</head>
<body>
    <!-- Your header and controls with narrow buttons -->
    <div class="controls">
        <div class="control-row">
            <button onclick="refreshData()" class="refresh-btn" id="refreshBtn">🔄 Refresh</button>
            <button onclick="startOver()" class="startover-btn">Start Over</button>
            <button onclick="showSelectionModal()" class="export-btn">Total</button>
        </div>
        <!-- rest of controls unchanged -->
    </div>

    <!-- Your table, modals, etc. unchanged -->

    <script>
        let sales = [];

        async function fetchJSON(filename) {
            try {
                const res = await fetch(`data/\( {filename}?t= \){Date.now()}`);
                if (!res.ok) throw new Error('Not found');
                return await res.json();
            } catch (e) {
                console.error('Failed to load', filename);
                return [];
            }
        }

        async function refreshData() {
            const btn = document.getElementById('refreshBtn');
            btn.disabled = true;
            btn.textContent = '🔄 Loading...';
            
            sales = await fetchJSON('sales.json');
            if (sales.length > 0) {
                renderTable(sales);
                sortTable(2, true);
                updateFooter();
                showToast('✅ Sales refreshed!');
            } else {
                showToast('❌ Failed to load data/sales.json');
            }
            btn.disabled = false;
            btn.textContent = '🔄 Refresh';
        }

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.style.cssText = 'position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#22c55e;color:white;padding:12px 24px;border-radius:8px;z-index:9999;font-size:14px;';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }

        async function loadSales() {
            sales = await fetchJSON('sales.json');
            if (sales.length > 0) {
                renderTable(sales);
                sortTable(2, true);
                updateFooter();
            } else {
                document.getElementById('footer').textContent = 'Error loading data/sales.json';
            }
        }

        // Keep ALL your other functions (renderTable, filterTable, startOver, etc.)

        window.onload = loadSales;
    </script>
</body>
</html>
