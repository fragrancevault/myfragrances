<!DOCTYPE html>
<!-- 
    =============================================
    MY FRAGRANCE COLLECTION - SALES PAGE
    =============================================
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Frag Vault</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            margin: 0; 
            background: #0a0a0a; 
            color: #e0e0e0;
            line-height: 1.5;
        }
        
        header {
            background: linear-gradient(135deg, #1a1a1a, #0f0f0f);
            color: white;
            padding: 1.6rem 1rem;
            text-align: center;
            border-bottom: 1px solid #333;
            position: relative;
        }
        h1 { margin: 0; font-size: 2.0rem; }

        #total-display {
            margin-top: 10px;
            font-size: 1.35rem;
            font-weight: bold;
            color: #4ade80;
        }

        .controls { 
            padding: 18px 20px 14px; 
            background: #111; 
            border-bottom: 1px solid #333;
        }

        .control-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            align-items: center;
            margin-bottom: 12px;
        }

        .search-row { margin-bottom: 12px; }

        input { 
            padding: 10px 12px; 
            font-size: 14px;
            border-radius: 8px; 
            background: #1f1f1f;
            color: #e0e0e0;
            border: 1px solid #444;
            width: 100%;
            max-width: 600px;
        }

        button { 
            background: #0066cc; 
            color: white; 
            border: none; 
            cursor: pointer;
            font-weight: bold;
            font-size: 13.5px;
            padding: 9px 16px;
            border-radius: 20px;
            white-space: nowrap;
            min-width: 110px;
        }

        .startover-btn { background: #d97706 !important; min-width: 120px; }
        .export-btn { background: #15803d !important; min-width: 160px; padding: 9px 20px; }

        .table-wrapper { 
            padding: 0 20px 20px; 
            overflow-x: auto; 
            max-height: 75vh;
            overflow-y: auto;
        }
        table { 
            min-width: 1100px; 
            border-collapse: collapse; 
            background: #111; 
            width: 100%;
            table-layout: fixed;
        }
        th, td { 
            padding: 10px 8px; 
            border-bottom: 1px solid #333;
            font-size: 14px;
            vertical-align: top;
            text-align: left;
        }
        th { 
            background: #1a1a1a; 
            color: #fff; 
            position: sticky; 
            top: 0; 
            z-index: 10;
            font-size: 14.5px;
            text-align: left;
        }

        /* Minimal first columns */
        th:nth-child(1), td:nth-child(1) { width: 38px; max-width: 38px; text-align: center; }
        th:nth-child(2), td:nth-child(2) { width: 72px; max-width: 72px; text-align: center; }

        input.quantity-input {
            width: 50px;
            text-align: center;
            background: #1f1f1f;
            color: #e0e0e0;
            border: 1px solid #444;
            border-radius: 4px;
            padding: 4px;
        }

        /* Other columns */
        th:nth-child(3), td:nth-child(3) { width: 140px; word-wrap: break-word; white-space: normal; }
        th:nth-child(4), td:nth-child(4) { width: 130px; word-wrap: break-word; white-space: normal; }
        th:nth-child(5), td:nth-child(5) { width: 90px; text-align: right; }
        th:nth-child(6), td:nth-child(6) { width: 95px; word-wrap: break-word; white-space: normal; }
        th:nth-child(7), td:nth-child(7) { width: 95px; word-wrap: break-word; white-space: normal; }
        th:nth-child(8), td:nth-child(8) { width: 60px; text-align: left; }
        th:nth-child(9), td:nth-child(9) { width: 220px; word-wrap: break-word; white-space: normal; }

        .link-cell { text-align: left; padding-left: 12px; }
        .link-cell a { color: #60a5fa; font-size: 1.4rem; text-decoration: none; }
        .link-cell a:hover { color: #93c5fd; }

        input[type="checkbox"] { width: 18px; height: 18px; accent-color: #0066cc; }

        .status-available { color: #4ade80; font-weight: 600; }
        .status-sold { color: #f87171; font-weight: 600; }

        /* Modal Styles */
        #selection-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        #modal-content {
            background: #1a1a1a;
            padding: 25px;
            border-radius: 12px;
            max-width: 700px;
            max-height: 85vh;
            overflow-y: auto;
            border: 1px solid #444;
            width: 90%;
        }
        #modal-content h2 {
            margin-top: 0;
            color: #4ade80;
        }
        .selection-list {
            list-style: none;
            padding: 0;
        }
        .selection-list li {
            padding: 12px 0;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .item-info {
            flex: 1;
        }
        .house-name {
            font-weight: bold;
            color: #93c5fd;
            font-size: 1.1em;
        }
        .price-info {
            text-align: right;
            min-width: 140px;
            color: #4ade80;
        }
        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .modal-buttons button {
            flex: 1;
            padding: 12px;
        }
        .close-btn { background: #f87171; }
        .export-csv-btn { background: #15803d; }
    </style>
</head>
<body>
    <header>
        <h1>The Frag Vault</h1>
        <div id="total-display">Total Selected: $0</div>
    </header>
    
    <div class="controls">
        <div class="control-row search-row">
            <input type="text" id="search" placeholder="Search House, Name, Genre, Status, Notes..." onkeyup="filterTable()">
        </div>

        <div class="control-row">
            <button onclick="sortTable(2)">House</button>
            <button onclick="sortTable(3)">Name</button>
            <button onclick="sortTable(4)">5ml</button>
            <button onclick="sortTable(5)">Genre</button>
            <button onclick="sortTable(6)">Status</button>
        </div>

        <div class="control-row">
            <button onclick="startOver()" class="startover-btn">Start Over</button>
            <button onclick="showSelectionModal()" class="export-btn">Total</button>
        </div>
    </div>

    <div class="table-wrapper">
        <table id="sales-table">
            <thead>
                <tr>
                    <th><input type="checkbox" id="select-all" onchange="toggleSelectAll()"></th>
                    <th>Qty</th>
                    <th onclick="sortTable(2)">House</th>
                    <th onclick="sortTable(3)">Name</th>
                    <th onclick="sortTable(4)">5ml</th>
                    <th onclick="sortTable(5)">Genre</th>
                    <th onclick="sortTable(6)">Status</th>
                    <th>Link</th>
                    <th>Notes</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <footer id="footer">Loading sales...</footer>

    <!-- Selection Modal -->
    <div id="selection-modal">
        <div id="modal-content">
            <h2>Selected Items (<span id="modal-count">0</span>)</h2>
            <ul id="selection-list" class="selection-list"></ul>
            
            <div class="modal-buttons">
                <button onclick="exportSelectedToCSV()" class="export-csv-btn">Export to CSV</button>
                <button onclick="closeModal()" class="close-btn">Close</button>
            </div>
        </div>
    </div>

    <script>
        let sales = [];
        let fragrances = [];
        let sortState = {};

        function cleanValue(val) {
            if (val === null || val === undefined || val === '' || val === '?') return 'N/A';
            return val.trim();
        }

        function formatPrice(val) {
            const cleaned = cleanValue(val);
            if (cleaned === 'N/A') return 'N/A';
            if (!isNaN(parseFloat(cleaned))) return '$' + cleaned;
            return cleaned;
        }

        function isAvailable(status) {
            return status && status.toLowerCase().includes('available');
        }

        function updateTotal() {
            const selectedRows = getSelectedRows();
            let total = 0;

            selectedRows.forEach(row => {
                const qtyInput = row.querySelector('.quantity-input');
                const qty = qtyInput ? parseInt(qtyInput.value) || 1 : 1;
                const priceCell = row.cells[4];
                const priceText = priceCell.textContent.trim().replace('$', '').replace(',', '');
                const price = parseFloat(priceText) || 0;
                total += qty * price;
            });

            document.getElementById('total-display').textContent = `Total Selected: $${total.toLocaleString()}`;
        }

        async function loadCSV() {
            try {
                const mainUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRU5S6orMQ6ZMdAkt8lFoFgaSAd9hfM1F9BMipKg1pxxjgxNfIczP5j598EwO8TkqG3yN60u9IjKGrN/pub?gid=1371140242&single=true&output=csv";
                const mainRes = await fetch(mainUrl + (mainUrl.includes('?') ? '&' : '?') + 't=' + Date.now());
                const mainText = await mainRes.text();

                Papa.parse(mainText, {
                    header: true,
                    skipEmptyLines: true,
                    complete: (mainResult) => {
                        fragrances = mainResult.data
                            .filter(row => row.Name && row.Name.trim())
                            .map(row => {
                                Object.keys(row).forEach(key => {
                                    if (typeof row[key] === 'string') row[key] = row[key].trim();
                                });
                                return row;
                            });
                        loadSalesCSV();
                    }
                });
            } catch (e) {
                console.error("Load error:", e);
            }
        }

        async function loadSalesCSV() {
            try {
                const salesUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRU5S6orMQ6ZMdAkt8lFoFgaSAd9hfM1F9BMipKg1pxxjgxNfIczP5j598EwO8TkqG3yN60u9IjKGrN/pub?gid=1452885969&single=true&output=csv";
                const res = await fetch(salesUrl + (salesUrl.includes('?') ? '&' : '?') + 't=' + Date.now());
                const text = await res.text();

                Papa.parse(text, {
                    header: true,
                    skipEmptyLines: true,
                    complete: (result) => {
                        sales = result.data
                            .filter(row => row.Name && row.Name.trim())
                            .map(row => {
                                Object.keys(row).forEach(key => {
                                    if (typeof row[key] === 'string') row[key] = row[key].trim();
                                });
                                const match = fragrances.find(f => f.House === row.House && f.Name === row.Name);
                                row.Genre = match ? match.Genre : 'N/A';
                                row.Notes = match ? (match.Notes || match.Comments || '') : 'N/A';
                                return row;
                            });
                        
                        renderTable(sales);
                        sortTable(2, true);
                        updateFooter();
                    }
                });
            } catch (e) {
                console.error("Sales load error:", e);
            }
        }

        function renderTable(data) {
            const tbody = document.querySelector('#sales-table tbody');
            let html = '';
            for (let i = 0; i < data.length; i++) {
                const s = data[i];
                const link = s.Link && s.Link.trim() !== '' && s.Link !== 'N/A' 
                    ? `<a href="${s.Link}" target="_blank" title="View listing">🔗</a>` 
                    : 'N/A';
                
                const statusClass = isAvailable(s.Status) ? 'status-available' : 'status-sold';
                const isAvail = isAvailable(s.Status);

                html += '<tr>' +
                    '<td><input type="checkbox" class="row-select" ' + (isAvail ? '' : 'disabled') + ' onchange="updateSelectAllState(); updateTotal()"></td>' +
                    '<td><input type="number" min="1" value="1" class="quantity-input" onchange="updateTotal()" ' + (isAvail ? '' : 'disabled') + ' onfocus="this.select()"></td>' +
                    '<td>' + cleanValue(s.House) + '</td>' +
                    '<td><strong>' + cleanValue(s.Name) + '</strong></td>' +
                    '<td>' + formatPrice(s['5ml']) + '</td>' +
                    '<td>' + cleanValue(s.Genre) + '</td>' +
                    '<td class="' + statusClass + '">' + cleanValue(s.Status) + '</td>' +
                    '<td class="link-cell">' + link + '</td>' +
                    '<td>' + cleanValue(s.Notes) + '</td>' +
                    '</tr>';
            }
            tbody.innerHTML = html;
            updateTotal();
        }

        function toggleSelectAll() {
            const selectAll = document.getElementById('select-all');
            const checkboxes = document.querySelectorAll('.row-select:not([disabled])');
            checkboxes.forEach(cb => cb.checked = selectAll.checked);
            updateTotal();
        }

        function updateSelectAllState() {
            const selectAll = document.getElementById('select-all');
            const enabledCheckboxes = Array.from(document.querySelectorAll('.row-select:not([disabled])'));
            const allChecked = enabledCheckboxes.length > 0 && enabledCheckboxes.every(cb => cb.checked);
            selectAll.checked = allChecked;
        }

        function getSelectedRows() {
            const rows = Array.from(document.querySelectorAll('#sales-table tbody tr'));
            return rows.filter(row => {
                const cb = row.querySelector('.row-select');
                return cb && cb.checked;
            });
        }

        function filterTable() {
            const term = document.getElementById('search').value.toLowerCase().trim();
            const filtered = sales.filter(s => {
                if (!term) return true;
                const searchableText = [s.House, s.Name, s.Genre, s['5ml'], s.Status, s.Notes]
                    .filter(Boolean).join(' ').toLowerCase();
                return searchableText.includes(term);
            });
            renderTable(filtered);
            updateFooter(filtered);
            updateUrl();
        }

        function updateFooter(filteredData = null) {
            const data = filteredData || sales;
            document.getElementById('footer').innerHTML = `<strong>${data.length}</strong> items listed`;
        }

        function startOver() {
            document.getElementById('search').value = '';
            document.getElementById('select-all').checked = false;
            sortState = {};
            renderTable(sales);
            sortTable(2, true);
            updateFooter();
            updateUrl();
        }

        function showSelectionModal() {
            const selectedRows = getSelectedRows();
            if (selectedRows.length === 0) {
                alert("Please select at least one Available item.");
                return;
            }

            const items = selectedRows.map(row => {
                const qtyInput = row.querySelector('.quantity-input');
                const qty = qtyInput ? parseInt(qtyInput.value) || 1 : 1;
                const house = row.cells[2].textContent.trim();
                const name = row.cells[3].textContent.trim();
                const priceStr = row.cells[4].textContent.trim();

                return { house, name, price: priceStr, qty };
            });

            document.getElementById('modal-count').textContent = items.length;
            
            const listHtml = items.map(item => 
                `<li>
                    <div class="item-info">
                        <span class="house-name">${item.house}</span><br>
                        ${item.name}
                    </div>
                    <div class="price-info">
                        ${item.price} × ${item.qty}
                    </div>
                </li>`
            ).join('');
            
            document.getElementById('selection-list').innerHTML = listHtml;
            document.getElementById('selection-modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('selection-modal').style.display = 'none';
        }

        // Export to CSV from modal
        function exportSelectedToCSV() {
            const selectedRows = getSelectedRows();
            if (selectedRows.length === 0) return;

            let csv = "House,Name,Quantity,5ml,Row Total\n";

            selectedRows.forEach(row => {
                const qtyInput = row.querySelector('.quantity-input');
                const qty = qtyInput ? parseInt(qtyInput.value) || 1 : 1;
                const house = row.cells[2].textContent.trim();
                const name = row.cells[3].textContent.trim();
                const priceText = row.cells[4].textContent.trim().replace('$', '').replace(',', '');
                const price = parseFloat(priceText) || 0;
                const rowTotal = qty * price;

                csv += `"\( {house.replace(/"/g, '""')}"," \){name.replace(/"/g, '""')}",\( {qty}," \){price}",${rowTotal}\n`;
            });

            const blob = new Blob([csv], { type: 'text/csv' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `Fragrance_Sales_Selected_${new Date().toISOString().slice(0,10)}.csv`;
            link.click();
        }

        function sortTable(colIndex, forceInitial = false) {
            const tbody = document.querySelector('#sales-table tbody');
            let rows = Array.from(tbody.querySelectorAll('tr'));
            
            if (forceInitial) {
                rows.sort((a, b) => {
                    const houseA = a.cells[2].textContent.trim();
                    const houseB = b.cells[2].textContent.trim();
                    const nameA = a.cells[3].textContent.trim();
                    const nameB = b.cells[3].textContent.trim();
                    const houseCompare = houseA.localeCompare(houseB);
                    if (houseCompare !== 0) return houseCompare;
                    return nameA.localeCompare(nameB);
                });
            } else {
                if (sortState[colIndex] === undefined) {
                    sortState[colIndex] = (colIndex === 4) ? false : true;
                } else {
                    sortState[colIndex] = !sortState[colIndex];
                }
                const ascending = sortState[colIndex];

                rows.sort((a, b) => {
                    let x = a.cells[colIndex].textContent.trim();
                    let y = b.cells[colIndex].textContent.trim();
                    const numX = parseFloat(x.replace('$', '').replace(',', ''));
                    const numY = parseFloat(y.replace('$', '').replace(',', ''));
                    if (!isNaN(numX) && !isNaN(numY)) {
                        return ascending ? numX - numY : numY - numX;
                    }
                    return ascending ? x.localeCompare(y) : y.localeCompare(x);
                });
            }
            
            rows.forEach(row => tbody.appendChild(row));
            updateTotal();
        }

        function updateUrl() {
            const searchTerm = document.getElementById('search').value.trim();
            const params = new URLSearchParams();
            if (searchTerm) params.set('search', searchTerm);
            const newUrl = window.location.pathname + (params.toString() ? '?' + params.toString() : '');
            window.history.replaceState({}, '', newUrl);
        }

        window.onload = loadCSV;
    </script>
</body>
</html>
